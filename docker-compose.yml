version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: openwebui-db
    environment:
      POSTGRES_DB: openwebui
      POSTGRES_USER: openwebui
      POSTGRES_PASSWORD: openwebui_password
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openwebui"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openwebui-network

  middleware:
    build:
      context: ./middleware
      dockerfile: Dockerfile
    container_name: openwebui-middleware
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: https://api.openai.com/v1
      SYSTEM_PROMPT_PATH: /app/SYSTEM_PROMPT.txt
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health', timeout=2)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - openwebui-network

  webui:
    image: ghcr.io/open-webui/open-webui:0.6.5
    container_name: openwebui
    environment:
      DATABASE_URL: postgresql://openwebui:openwebui_password@db:5432/openwebui
      OPENAI_API_BASE_URL: http://middleware:8000/v1
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      WEBUI_NAME: "Open WebUI + Middleware"
      ENABLE_SIGNUP: "true"
      DEFAULT_MODELS: "gpt-4o,gpt-4o-mini,gpt-3.5-turbo"
    ports:
      - "3000:8080"
    volumes:
      - webui_data:/app/backend/data
    depends_on:
      db:
        condition: service_healthy
      middleware:
        condition: service_healthy
    networks:
      - openwebui-network
    restart: unless-stopped

volumes:
  db_data:
  webui_data:

networks:
  openwebui-network:
    driver: bridge
